<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmospheric Weather | 3D</title>
    <link rel="stylesheet" href="weathercss.css">
    <style>
        /* Essential layout overrides for 3D Earth */
        #earth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: auto;
        }

        body {
            background: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            perspective: 2800px;
        }

        /* Ambient Atmospheric Glow - sits behind the card but in front of Earth */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 78% 42%, rgba(80, 200, 255, 0.25) 0%, transparent 55%),
                radial-gradient(circle at 25% 75%, rgba(120, 220, 255, 0.12) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* Responsive Fix for mobile */
        @media (max-width: 600px) {
            body { justify-content: center; }
            .card { margin-left: 0; width: 90%; }
        }
    </style>
</head>
<body>

    <div id="earth-container"></div>

    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button id="searchBtn">
                <img src="https://img.icons8.com/scribby/50/000000/search.png" alt="search">
            </button>
        </div>
        
        <div class="weather" style="display: none;">
            <img src="https://img.icons8.com/3d-fluency/94/sun.png" class="weather-icon">
            <h1 class="temp">--°C</h1>
            <h2 class="city">--</h2>
            
            <div class="activity-box">
                <p class="activity-label">Activity Recommendation</p>
                <p class="activity-text">Scanning for the perfect vibe...</p>
            </div>

            <div class="details">
                <div class="col">
                    <img src="https://img.icons8.com/3d-fluency/94/windy-weather.png" alt="humidity">
                    <div>
                        <p class="humidity">--%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="https://img.icons8.com/3d-fluency/94/wind.png" alt="wind">
                    <div>
                        <p class="wind">-- km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="error" style="display: none; text-align: center; color: #ff6b6b; padding: 20px;">
            City not found. Try another coordinate? 🛰️
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ==================== INTERACTIVE 3D EARTH ====================
        let scene, camera, renderer, earth, clouds, controls;
        const earthContainer = document.getElementById('earth-container');

        function initEarth() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(2.5, 0.5, 6); // Offset slightly to look good next to the card

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            earthContainer.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
            sunLight.position.set(10, 10, 10);
            scene.add(sunLight);

            const textureLoader = new THREE.TextureLoader();

            // Earth
            const earthMat = new THREE.MeshPhongMaterial({
                map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.1,
                specularMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg'),
                specular: 0x111111,
                shininess: 5
            });

            const earthGeo = new THREE.SphereGeometry(2, 64, 64);
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // Clouds
            const cloudMat = new THREE.MeshPhongMaterial({
                map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true,
                opacity: 0.8,
                depthWrite: false
            });

            const cloudGeo = new THREE.SphereGeometry(2.04, 64, 64);
            clouds = new THREE.Mesh(cloudGeo, cloudMat);
            scene.add(clouds);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.enableZoom = false; // Disable zoom to keep UI focus

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animateEarth();
        }

        function animateEarth() {
            requestAnimationFrame(animateEarth);
            if (earth) earth.rotation.y += 0.0008;
            if (clouds) clouds.rotation.y += 0.0012;
            controls.update();
            renderer.render(scene, camera);
        }

        // ==================== WEATHER LOGIC ====================
        const apikey = "REPLACE_WITH_API_KEY"; // Your key
        const apiurl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector("#searchBtn");
        const weatherIcon = document.querySelector(".weather-icon");
        const activityText = document.querySelector(".activity-text");

        async function checkWeather(city) {
            const response = await fetch(apiurl + city + `&appid=${apikey}`);
            
            if (response.status == 404) {
                document.querySelector(".error").style.display = "block";
                document.querySelector(".weather").style.display = "none";
            } else {
                const data = await response.json();

                document.querySelector(".city").textContent = data.name;
                document.querySelector(".temp").textContent = Math.round(data.main.temp) + "°C";
                document.querySelector(".humidity").textContent = data.main.humidity + "%";
                document.querySelector(".wind").textContent = data.wind.speed + " km/h";

                const condition = data.weather[0].main;
                let activity = "";

                // Custom Personalized Logic
                if (condition == "Rain") {
                    weatherIcon.src = "https://img.icons8.com/3d-fluency/94/storm.png";
                    activity = "It's pouring. Time to brew coffee and crush some Python bugs or work on your digital art. 🐍☕";
                } else if (condition == "Clear") {
                    weatherIcon.src = "https://img.icons8.com/3d-fluency/94/sun.png";
                    activity = "Clear skies! Perfect for a park walk or testing out your latest Chrome extension. ☀️🚀";
                } else if (condition == "Clouds") {
                    weatherIcon.src = "https://img.icons8.com/3d-fluency/94/partly-cloudy-day.png";
                    activity = "Cloudy vibes. Great soft light for a design session or lo-fi coding. ☁️🎨";
                } else {
                    weatherIcon.src = "https://img.icons8.com/3d-fluency/94/sun.png";
                    activity = "The weather is shifting. Grab some local street food and keep building! 🍕";
                }

                activityText.textContent = activity;
                document.querySelector(".weather").style.display = "block";
                document.querySelector(".error").style.display = "none";
            }
        }

        searchBtn.addEventListener("click", () => checkWeather(searchBox.value));
        searchBox.addEventListener("keypress", (e) => { if (e.key === "Enter") checkWeather(searchBox.value); });

        window.onload = initEarth;
    </script>
</body>
</html>
